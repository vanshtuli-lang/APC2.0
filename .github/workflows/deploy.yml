name: Deploy to APC

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Astro CLI
        run: curl -sSL https://install.astronomer.io | sudo bash

      - name: Deploy to APC
        env:
          ASTRONOMER_KEY_SECRET: ${{ secrets.ASTRONOMER_KEY_SECRET }}
        run: |
          mkdir -p ~/.astro
          cat <<EOF > ~/.astro/config.yaml
          cloud:
            api:
              port: "443"
              protocol: https
              ws_protocol: wss
            base_domain: demo-lab.aws.astronomer-demo.com
          context: demo-lab.aws.astronomer-demo.com
          contexts:
            demo-lab.aws.astronomer-demo.com:
              domain: demo-lab.aws.astronomer-demo.com
              token: ${ASTRONOMER_KEY_SECRET}
              workspace: cmqiarxkc0008gz18vyojvlp4
              last_used_workspace: cmqiarxkc0008gz18vyojvlp4
          EOF
          astro deploy cmppik87t16d701ld32ftjblj --force
